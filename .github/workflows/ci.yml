# CryptoQuant 蓝图原型 · CI 回归守门
#
# 作用：每次 push / PR 自动跑全套回归，任一 ❌ 即失败、拦住合并/部署。
# 触发：推到 GitHub 后由 GitHub 免费 runner 自动执行（无需自备服务器）。
# 本地加好此文件、随代码一起 commit，推送即生效；推送前完全惰性。
name: CI

on:
  push:
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --upgrade pip pytest numpy

      - name: Pytest suite (tests/)
        run: python -m pytest tests/ -q

      - name: P1 fix verification (12 项)
        run: python verify_p1_fixes.py

      - name: Coverage gate (engine)
        # 【P2-5】覆盖率门禁：统计 cryptoquant_auto 生产引擎覆盖率（demo / run_validation
        # / 测试文件已在 .coveragerc 排除）。低于阈值即失败，拦住覆盖率塌方式回退。
        # 阈值在首次 CI 跑出真实数字后校准（见下方 --cov-fail-under）。
        run: |
          pip install pytest-cov
          python -m pytest cryptoquant_auto tests -q --cov=cryptoquant_auto --cov-report=term-missing --cov-fail-under=40

      - name: Validation stage4 (unified entry)
        # 【P2-4】统一入口 --stage 派发，替代直接调 run_validation_stage4.main
        run: python -m cryptoquant_auto.run_validation --stage 4

      - name: Validation stage3 (unified entry)
        run: python -m cryptoquant_auto.run_validation --stage 3

      - name: Validation stage0.5 (unified entry)
        run: python -m cryptoquant_auto.run_validation --stage 0.5
