<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoQuant · 系统日志</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0a0e1a; color: #c8d6e5; font-size: .8rem; }
    .card { background: #131a2b; border: 1px solid #1e2a45; border-radius: 12px; }
    .card-header { background: transparent; border-bottom: 1px solid #1e2a45; font-weight: 600; }
    .nav-link { color: #6c7a8e; font-weight: 500; }
    .nav-link:hover, .nav-link.active { color: #c8d6e5; }
    .navbar { border-bottom: 1px solid #1e2a45; }
    .btn-refresh { background: #1e2a45; border: none; color: #c8d6e5; border-radius: 8px; padding: .3rem .8rem; }
    .btn-refresh:hover { background: #2a3a5e; }
    .log-line { font-family: "SF Mono","Fira Code","Consolas",monospace; font-size: .75rem; padding: .15rem .5rem; border-bottom: 1px solid #1e2a45; white-space: pre-wrap; word-break: break-all; }
    .log-error { color: #df7d7d; background: #2a0a0a; }
    .log-warning { color: #dfc67d; background: #2a1a0a; }
    .log-info { color: #7ddf8a; }
    .log-debug { color: #6c7a8e; }
    .search-box { background: #1e2a45; border: 1px solid #2a3a5e; border-radius: 8px; padding: .4rem .8rem; color: #c8d6e5; width: 100%; }
    .search-box:focus { outline: none; border-color: #7ddf8a; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark px-3 py-2">
  <span class="fw-bold" style="color:#7ddf8a;">CryptoQuant</span>
  <ul class="nav ms-auto">
    <li class="nav-item"><a class="nav-link" href="/">概览</a></li>
    <li class="nav-item"><a class="nav-link" href="/signals">信号</a></li>
    <li class="nav-item"><a class="nav-link active" href="/logs">日志</a></li>
  </ul>
  <button class="btn-refresh ms-2" onclick="location.reload()">⟳</button>
</nav>

<div class="container-fluid px-3 py-3">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span>系统日志（最近 {{ lines|length }} 行）</span>
      <form method="get" class="d-flex gap-2" style="max-width:300px;">
        <input class="search-box" type="text" name="q" placeholder="搜索 ERROR / SL / TTL …" value="{{ search }}">
        <button class="btn-refresh" type="submit">搜索</button>
      </form>
    </div>
    <div class="card-body p-0" style="max-height:80vh;overflow-y:auto;">
      {% for line in lines %}
      {% set cls = 'log-error' if 'ERROR' in line else 'log-warning' if 'WARNING' in line else 'log-info' if 'INFO' in line else 'log-debug' %}
      <div class="log-line {{ cls }}">{{ line }}</div>
      {% endfor %}
      {% if not lines %}
      <div class="p-4 text-center text-muted">无日志</div>
      {% endif %}
    </div>
  </div>
</div>

<script>setTimeout(() => location.reload(), 300_000);</script>
</body>
</html>
